{% extends 'base.html' %}

{% block title %}Basket{% endblock %}

{% block content %}
  <h2>Your Basket</h2>

  {% if items %}
    <ul>
      {% for it in items %}
        <li>
          {{ it.title }} — Quantity: {{ it.quantity }}
          <button onclick="removeItem('{{ it.ISBN }}')">Remove</button>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>Your basket is empty.</p>
  {% endif %}

  <p><a href="{{ url_for('index') }}">Continue shopping</a></p>

  <script>
    async function removeItem(isbn) {
      const resp = await fetch('/remove_from_basket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ISBN: isbn })
      });
      const data = await resp.json();
      if (resp.ok) location.reload(); else alert(data.message || 'Error');
    }
  </script>

{% endblock %}
